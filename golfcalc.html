<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Pot Calculator</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #f1f8e9;
            --accent: #ffc107;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-start { background-color: var(--primary); color: white; }
        .btn-winner { background-color: var(--accent); color: #333; margin-bottom: 10px; }
        
        .hidden { display: none; }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .hole-indicator {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            padding: 10px 0;
        }
        .win { color: var(--primary); font-weight: bold; }
        .loss { color: #c62828; font-weight: bold; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="card">
        <h1>⛳ Golf Pot</h1>
        <label>Number of Players</label>
        <input type="number" id="num-players" value="4" min="2">
        
        <label>Stake per Hole ($)</label>
        <input type="number" id="stake" value="5" min="1">
        
        <label>Total Holes to Play</label>
        <input type="number" id="num-holes" value="18" min="1">

        <button class="btn-start" onclick="startGame()">Start Round</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="card hidden">
        <div class="hole-indicator" id="hole-display">Hole 1</div>
        <p style="text-align: center;">Who won this hole?</p>
        <div id="player-buttons-container">
            <!-- Buttons generated by JS -->
        </div>
        <button style="background: #999; color: white; margin-top: 30px;" onclick="confirmQuit()">End Round Early</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="result-screen" class="card hidden">
        <h1>Final Standings</h1>
        <div id="results-container"></div>
        <button class="btn-start" onclick="location.reload()">New Game</button>
    </div>

    <script>
        let players = [];
        let stake = 0;
        let totalHoles = 0;
        let currentHole = 1;

        function startGame() {
            const numPlayers = parseInt(document.getElementById('num-players').value);
            stake = parseFloat(document.getElementById('stake').value);
            totalHoles = parseInt(document.getElementById('num-holes').value);

            if (isNaN(numPlayers) || numPlayers < 2) {
                alert("Please enter at least 2 players.");
                return;
            }

            // Initialize players
            players = [];
            for (let i = 1; i <= numPlayers; i++) {
                players.push({
                    name: "Player " + i,
                    balance: 0
                });
            }

            // UI Switch
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            renderGame();
        }

        function renderGame() {
            document.getElementById('hole-display').innerText = `Hole ${currentHole} / ${totalHoles}`;
            const container = document.getElementById('player-buttons-container');
            container.innerHTML = '';

            players.forEach((player, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-winner';
                btn.innerText = player.name;
                btn.onclick = () => recordWinner(index);
                container.appendChild(btn);
            });
        }

        function recordWinner(winnerIndex) {
            // Logic: 
            // 1. Everyone loses the stake
            // 2. Winner gets the total pot (stake * number of players)
            
            const pot = stake * players.length;

            players.forEach((player, index) => {
                player.balance -= stake; // Everyone pays
                if (index === winnerIndex) {
                    player.balance += pot; // Winner gets the whole pot
                }
            });

            if (currentHole < totalHoles) {
                currentHole++;
                renderGame();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const container = document.getElementById('results-container');
            container.innerHTML = '';

            // Sort players by balance (highest to lowest)
            const sortedPlayers = [...players].sort((a, b) => b.balance - a.balance);

            sortedPlayers.forEach(player => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                const statusClass = player.balance >= 0 ? 'win' : 'loss';
                const sign = player.balance >= 0 ? '+' : '';
                
                div.innerHTML = `
                    <span>${player.name}</span>
                    <span class="${statusClass}">${sign}$${player.balance.toFixed(2)}</span>
                `;
                container.appendChild(div);
            });
        }

        function confirmQuit() {
            if(confirm("Are you sure you want to end the round early? Results will be calculated based on holes played.")) {
                showResults();
            }
        }
    </script>
</body>
</html>
